databases:
  - name: coffee-shop-db
    databaseName: coffee_shop
    user: coffee_shop_user
    plan: free
    region: singapore

services:
  - type: web
    name: coffee-shop-app
    runtime: docker
    plan: free
    region: singapore
    repo: https://github.com/LuminousPhuc/coofee_shop.git
    branch: main
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_NAME
        value: "Coffee Shop"
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        fromRenderService:
          type: web
          name: coffee-shop-app
          property: host
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: coffee-shop-db
          property: connectionString
      - key: DB_HOST
        fromDatabase:
          name: coffee-shop-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: coffee-shop-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: coffee-shop-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: coffee-shop-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: coffee-shop-db
          property: password
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: LOG_CHANNEL
        value: stderr
